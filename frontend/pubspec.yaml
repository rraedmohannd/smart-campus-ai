name: frontend
description: "Smart Campus AI frontend"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0

  flutter_localizations:
    sdk: flutter
  intl: ^0.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.webp
    - assets/images/campus.jpg
fonts:
  - family: Pattanakarn
    fonts:
      - asset: assets/fonts/Pattanakarn-Regular.ttf
      - asset: assets/fonts/Pattanakarn-ExtraBold.ttf
        weight: 800    